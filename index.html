<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>🌸 8 Марта 🌸</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #fbc2eb, #ffc3a0);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

@keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

.container {
    background: rgba(255, 255, 255, 0.95);
    padding: 30px;
    border-radius: 25px;
    width: 90%;
    max-width: 500px;
    text-align: center;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    animation: fadeIn 1.5s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(30px);}
    to {opacity: 1; transform: translateY(0);}
}

h1 {
    color: #e91e63;
    font-size: 28px;
    margin-bottom: 10px;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from {text-shadow: 0 0 5px #ff80ab;}
    to {text-shadow: 0 0 20px #ff4081;}
}

p {
    font-size: 16px;
    margin: 8px 0;
}

.decor {
    font-size: 24px;
    animation: float 3s ease-in-out infinite;
}

@keyframes float {
    0%, 100% {transform: translateY(0);}
    50% {transform: translateY(-10px);}
}

iframe {
    border-radius: 15px;
    margin-top: 15px;
}
</style>

</head>
<body>

<div class="container">
    <div class="decor">🌸✨🌷✨🌸</div>
    <h1>Приглашение на 8 Марта</h1>

    <p><b>Дата:</b> 8 марта</p>
    <p><b>Время:</b> 18:00</p>
    <p><b>Место:</b> Праздничный вечер 🎉</p>
    <p><b>Что принести:</b> сладости и хорошее настроение 😊</p>

    <hr>

    <h3>Подтверди участие:</h3>

    <!-- ВСТАВЬ СЮДА iframe из Google Forms -->
    <iframe 
        src="ССЫЛКА_ИЗ_GOOGLE_FORMS"
        width="100%" 
        height="400" 
        frameborder="0">
    </iframe>
    
</div>
<img src="images/1.jpg" style="position:fixed; top:5%; left:5%; width:120px;">
<img src="images/2.jpg" style="position:fixed; top:20%; left:20%; width:120px;">
<img src="images/3.jpg" style="position:fixed; top:35%; left:35%; width:120px;">
<img src="images/4.jpg" style="position:fixed; top:50%; left:50%; width:120px;">
<img src="images/5.jpg" style="position:fixed; top:65%; left:65%; width:120px;">
    
</body>

</html>
